<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Fichas Nutricionais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-[#051F00] from-0% via-[#004208] via-9% via-[#004A09] via-27% to-white to-60% min-h-screen flex flex-col justify-between">

<header class="w-full flex items-center justify-between p-4 text-white">
    <div class="flex items-center space-x-4">
        <a href="/">
            <img src="/images/Logo.png" alt="Logo" class="w-28 h-32">
        </a>
    </div>
    <h1 class="text-[50px] font-semibold">Gestão de Fichas Nutricionais</h1>
    <div>
        <button class="text-white">
            <div class="flex items-center">
                <img src="/images/UserIcon.png" alt="Ícone do Usuário" class="w-16 h-18">
            </div>
        </button>
    </div>
</header>


<main class="mt-16 bg-[#74967B] border-2 border-black rounded-3xl p-8 w-[95%] max-w-7xl shadow-xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 min-h-[300px]">
        <a th:href="@{/fichas/nova}" class="bg-green-50 border-2 border-black rounded-xl p-6 flex flex-col items-center shadow-md h-full hover:shadow-lg transition-all duration-300 cursor-pointer transform hover:-translate-y-2">
            <div class="flex items-center justify-center w-full max-w-[300px] h-[200px] mb-6">
                <div class="relative">
                    <i class="fa-solid fa-file text-green-900" style="font-size: 12rem;"></i>
                    <i class="fa-solid fa-plus absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white text-6xl"></i>
                </div>
            </div>
            <span class="bg-white px-6 py-3 rounded-full text-black mt-auto text-center text-lg font-medium w-full max-w-[250px]">
                Criar Ficha
            </span>
        </a>
        <a th:href="@{/fichas}" class="bg-green-50 border-2 border-black rounded-xl p-6 flex flex-col items-center shadow-md h-full hover:shadow-lg transition-all duration-300 cursor-pointer transform hover:-translate-y-2">
            <div class="flex items-center justify-center w-full max-w-[300px] h-[200px] mb-6 text-black">
                <i class="fa-solid fa-file text-green-900" style="font-size: 12rem;"></i>
            </div>
            <span class="bg-white px-6 py-3 rounded-full text-black mt-auto text-center text-lg font-medium w-full max-w-[250px]">
                Suas Fichas
            </span>
        </a>
        <a th:href="@{/ingredientes/novo}" class="bg-green-50 border-2 border-black rounded-xl p-6 flex flex-col items-center shadow-md h-full hover:shadow-lg transition-all duration-300 cursor-pointer transform hover:-translate-y-2">
            <div class="flex items-center justify-center w-full max-w-[300px] h-[200px] mb-6">
                <div class="relative">
                    <i class="fa-solid fa-bowl-food text-green-900" style="font-size: 12rem;"></i>
                    <i class="fa-solid fa-plus absolute top-[55%] left-[37%] text-white text-6xl"></i>
                </div>
            </div>
            <span class="bg-white px-6 py-3 rounded-full text-black mt-auto text-center text-lg font-medium w-full max-w-[250px]">
                Criar Ingredientes
            </span>
        </a>
        <a th:href="@{/ingredientes}" class="bg-green-50 border-2 border-black rounded-xl p-6 flex flex-col items-center shadow-md h-full hover:shadow-lg transition-all duration-300 cursor-pointer transform hover:-translate-y-2">
            <div class="flex items-center justify-center w-full max-w-[300px] h-[200px] mb-6">
                <i class="fa-solid fa-bowl-food text-green-900" style="font-size: 12rem;"></i>
            </div>
            <span class="bg-white px-6 py-3 rounded-full text-black mt-auto text-center text-lg font-medium w-full max-w-[250px]">
                Seus Ingredientes
            </span>
        </a>
    </div>
</main>
<div th:replace="~{Footer :: main-footer}"></div>
</body>
</html>
